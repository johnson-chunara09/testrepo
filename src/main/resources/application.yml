spring:
  application:
    name: rag-backend

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

  datasource:
    url: jdbc:h2:file:./data/ragapp
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-opus-4-8
          max-tokens: 2048

server:
  port: 8080

app:
  jwt:
    # Override in production: at least 32 bytes
    secret: ${JWT_SECRET:dev-only-secret-change-me-0123456789abcdef0123456789}
    expiration-ms: 86400000
  vector-store:
    path: ./data/vector-store.json
  cors:
    allowed-origins: http://localhost:4200

logging:
  level:
    com.example.rag: INFO
